name: CI

# This section defines the TRIGGER: when does this pipeline run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: get the code onto the pipeline's virtual machine
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: set up the environment (Python) needed to run the app
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: this is the CI part — run automated tests on every push
      - name: Run tests
        run: pytest -v

      # Step 5: prove the app actually runs, not just that tests pass
      - name: Run the app
        run: python todo.py
